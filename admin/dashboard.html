<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - OVERRAIN</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f5;
      --text-primary: #333333;
      --text-secondary: #666666;
      --accent: #165DFF;
      --border: #e5e5e5;
    }
    [data-theme="dark"] {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --text-primary: #e5e5e5;
      --text-secondary: #a0a0a0;
      --accent: #40C4FF;
      --border: #2d2d44;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      min-height: 100vh;
    }
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 240px;
      height: 100vh;
      background: var(--bg-primary);
      border-right: 1px solid var(--border);
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      z-index: 100;
    }
    .sidebar-logo {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #165DFF, #40C4FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      padding: 0 12px;
      margin-bottom: 32px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      padding: 12px;
      border-radius: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      margin-bottom: 4px;
      transition: all 0.2s;
      cursor: pointer;
    }
    .nav-item:hover, .nav-item.active {
      background: var(--bg-secondary);
      color: var(--accent);
    }
    .nav-item i { font-size: 20px; margin-right: 12px; }
    .main-content {
      margin-left: 240px;
      padding: 32px;
      min-height: 100vh;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .header h2 { font-size: 24px; font-weight: 600; }
    .btn-primary {
      padding: 10px 20px;
      background: linear-gradient(135deg, #165DFF, #40C4FF);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary {
      padding: 8px 16px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-secondary:hover { border-color: var(--accent); }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--bg-primary);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .stat-card .icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-bottom: 12px;
    }
    .stat-card .value { font-size: 24px; font-weight: 700; }
    .stat-card .label { color: var(--text-secondary); margin-top: 4px; font-size: 13px; }
    .content-card {
      background: var(--bg-primary);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .table { width: 100%; border-collapse: collapse; }
    .table th, .table td {
      text-align: left;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .table th {
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 13px;
      text-transform: uppercase;
    }
    .actions { display: flex; gap: 8px; }
    .btn-small {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-edit { background: #e0f2fe; color: #0284c7; }
    .btn-delete { background: #fee2e2; color: #dc2626; }
    .logout-btn {
      margin-top: auto;
      padding: 12px;
      background: #fee2e2;
      color: #dc2626;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    /* 模态框 */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal.show { display: flex; }
    .modal-content {
      background: var(--bg-primary);
      border-radius: 12px;
      padding: 32px;
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .modal-header h3 { font-size: 18px; font-weight: 600; }
    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--text-secondary);
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      background: var(--bg-secondary);
      color: var(--text-primary);
    }
    .form-group textarea { min-height: 120px; resize: vertical; }
    .form-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 24px;
    }
    .btn-cancel {
      padding: 10px 20px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
    }
    .btn-submit {
      padding: 10px 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    /* 分类树 */
    .cat-tree { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
    .cat-branch {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .cat-item {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .cat-item:last-child { border-bottom: none; }
    .cat-item:hover { background: var(--bg-secondary); }
    .cat-indent { padding-left: 24px; }
    .cat-indent-2 { padding-left: 48px; }
    .cat-indent-3 { padding-left: 72px; }
    .cat-icon { font-size: 18px; width: 24px; text-align: center; }
    .cat-name { flex: 1; font-weight: 500; }
    .cat-count { font-size: 12px; color: var(--text-secondary); padding: 2px 8px; background: var(--bg-secondary); border-radius: 4px; }
    .cat-actions { display: flex; gap: 4px; }
    .cat-actions button {
      padding: 4px 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .cat-move-up { background: #e0f2fe; color: #0284c7; }
    .cat-move-down { background: #dcfce7; color: #16a34a; }
    .cat-edit-btn { background: #fef3c7; color: #d97706; }
    .cat-delete-btn { background: #fee2e2; color: #dc2626; }
    .cat-add-child { background: #f3e8ff; color: #7c3aed; }
    .cat-child-container { background: var(--bg-secondary); border-top: 1px dashed var(--border); }
    .cat-expand-btn {
      width: 20px;
      height: 20px;
      border: none;
      background: var(--bg-secondary);
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--text-secondary);
      transition: all 0.2s;
    }
    .cat-expand-btn:hover { background: var(--accent); color: white; }
    .cat-expand-btn.expanded { transform: rotate(90deg); }
    /* 标签页样式 */
    .tab-nav {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }
    .tab-btn {
      padding: 10px 20px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      border-radius: 8px;
      transition: all 0.2s;
    }
    .tab-btn:hover, .tab-btn.active {
      background: var(--accent);
      color: white;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    /* 消息提示 */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 24px;
      background: #333;
      color: white;
      border-radius: 8px;
      z-index: 2000;
    }
    .toast.success { background: #52c41a; }
    .toast.error { background: #dc2626; }
    @media (max-width: 768px) {
      .sidebar { width: 60px; }
      .sidebar-logo, .nav-item span, .logout-btn span { display: none; }
      .nav-item { justify-content: center; }
      .main-content { margin-left: 60px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <!-- 侧边栏 -->
  <aside class="sidebar">
    <div class="sidebar-logo">OVERRAIN</div>
    <a class="nav-item active" data-tab="dashboard"><i class="ri-dashboard-line"></i><span>仪表盘</span></a>
    <a class="nav-item" data-tab="articles"><i class="ri-article-line"></i><span>文章管理</span></a>
    <a class="nav-item" data-tab="categories"><i class="ri-folder-chart-line"></i><span>分类管理</span></a>
    <a class="nav-item" data-tab="messages"><i class="ri-message-line"></i><span>留言管理</span></a>
    <button class="logout-btn" onclick="logout()">
      <i class="ri-logout-box-r-line"></i><span>退出登录</span>
    </button>
  </aside>

  <!-- 主内容 -->
  <main class="main-content">
    <!-- 仪表盘 -->
    <section id="dashboard" class="tab-content active">
      <div class="header"><h2>仪表盘</h2></div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="icon" style="background:#dbeafe"><i class="ri-article-line" style="color:#165DFF"></i></div>
          <div class="value" id="statArticles">-</div>
          <div class="label">文章总数</div>
        </div>
        <div class="stat-card">
          <div class="icon" style="background:#dcfce7"><i class="ri-eye-line" style="color:#16a34a"></i></div>
          <div class="value" id="statViews">-</div>
          <div class="label">总浏览量</div>
        </div>
        <div class="stat-card">
          <div class="icon" style="background:#fef3c7"><i class="ri-folder-line" style="color:#d97706"></i></div>
          <div class="value" id="statCategories">-</div>
          <div class="label">分类数量</div>
        </div>
        <div class="stat-card">
          <div class="icon" style="background:#fce7f3"><i class="ri-message-line" style="color:#db2777"></i></div>
          <div class="value" id="statMessages">-</div>
          <div class="label">留言数量</div>
        </div>
      </div>
      <div class="content-card">
        <h3 style="margin-bottom:16px">最新文章</h3>
        <table class="table"><thead><tr><th>标题</th><th>分类</th><th>浏览</th><th>时间</th></tr></thead><tbody id="recentArticles"></tbody></table>
      </div>
    </section>

    <!-- 文章管理 -->
    <section id="articles" class="tab-content">
      <div class="header"><h2>文章管理</h2><button class="btn-primary" onclick="showArticleModal()"><i class="ri-add-line"></i> 新建文章</button></div>
      <div class="content-card">
        <table class="table"><thead><tr><th>ID</th><th>标题</th><th>分类</th><th>浏览</th><th>点赞</th><th>时间</th><th>操作</th></tr></thead><tbody id="articlesList"></tbody></table>
      </div>
    </section>

    <!-- 分类管理 -->
    <section id="categories" class="tab-content">
      <div class="header"><h2>分类管理</h2><button class="btn-primary" onclick="showCategoryModal()"><i class="ri-add-line"></i> 新建分类</button></div>
      <div class="content-card">
        <div id="categoryTree" class="cat-tree"></div>
      </div>
    </section>

    <!-- 留言管理 -->
    <section id="messages" class="tab-content">
      <div class="header"><h2>留言管理</h2></div>
      <div class="content-card">
        <table class="table"><thead><tr><th>ID</th><th>昵称</th><th>邮箱</th><th>内容</th><th>时间</th><th>操作</th></tr></thead><tbody id="messagesList"></tbody></table>
      </div>
    </section>
  </main>

  <!-- 文章模态框 -->
  <div class="modal" id="articleModal">
    <div class="modal-content" style="max-width: 700px;">
      <div class="modal-header">
        <h3 id="articleModalTitle">新建文章</h3>
        <button class="modal-close" onclick="closeArticleModal()">&times;</button>
      </div>
      <form id="articleForm">
        <input type="hidden" id="articleId">
        
        <!-- 导入 MD 文件区域 -->
        <div class="form-group" style="background: var(--bg-secondary); padding: 16px; border-radius: 8px; margin-bottom: 20px;">
          <label style="margin-bottom: 8px; display: block;">📄 导入 Markdown 文件</label>
          <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
            <input type="file" id="mdFileInput" accept=".md,.markdown" style="display: none;" onchange="handleMdFileImport(this)">
            <button type="button" class="btn-secondary" onclick="document.getElementById('mdFileInput').click()">
              <i class="ri-file-upload-line"></i> 选择 MD 文件
            </button>
            <span id="mdFileName" style="color: var(--text-secondary); font-size: 13px;">未选择文件</span>
            <button type="button" class="btn-secondary" onclick="downloadMdTemplate()" title="下载 MD 模板">
              <i class="ri-file-download-line"></i> 下载模板
            </button>
          </div>
          <p style="font-size: 12px; color: var(--text-secondary); margin-top: 8px;">
            支持带 frontmatter 的 MD 文件，自动提取标题、分类、标签、正文内容
          </p>
        </div>

        <div class="form-group">
          <label>标题 *</label>
          <input type="text" id="articleTitle" required>
        </div>
        <div class="form-group">
          <label>摘要</label>
          <textarea id="articleSummary" placeholder="文章摘要，不填则自动从前50字生成"></textarea>
        </div>
        <div class="form-group">
          <label>分类 *</label>
          <select id="articleCategory" required></select>
        </div>
        <div class="form-group">
          <label>标签（逗号分隔）</label>
          <input type="text" id="articleTags" placeholder="JavaScript, Vue, React">
        </div>
        <div class="form-group">
          <label>内容（Markdown） *</label>
          <textarea id="articleContent" style="min-height: 250px" required></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-cancel" onclick="closeArticleModal()">取消</button>
          <button type="submit" class="btn-submit">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 隐藏的模板下载 -->
  <a id="mdTemplateDownload" style="display: none;"></a>

  <!-- 分类模态框 -->
  <div class="modal" id="categoryModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="categoryModalTitle">新建分类</h3>
        <button class="modal-close" onclick="closeCategoryModal()">&times;</button>
      </div>
      <form id="categoryForm">
        <input type="hidden" id="categoryId">
        <div class="form-group">
          <label>分类名称 *</label>
          <input type="text" id="categoryName" required>
        </div>
        <div class="form-group">
          <label>父级分类</label>
          <select id="categoryParent">
            <option value="0">无（顶级分类）</option>
          </select>
        </div>
        <div class="form-group">
          <label>描述</label>
          <input type="text" id="categoryDesc">
        </div>
        <div class="form-group">
          <label>图标（Remix Icon 类名）</label>
          <input type="text" id="categoryIcon" placeholder="ri-folder-line">
        </div>
        <div class="form-group">
          <label>颜色</label>
          <input type="color" id="categoryColor" value="#165DFF">
        </div>
        <div class="form-actions">
          <button type="button" class="btn-cancel" onclick="closeCategoryModal()">取消</button>
          <button type="submit" class="btn-submit">保存</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API = 'https://myblog-qcy9.onrender.com/api';
    let allCategories = [];
    let allArticles = [];

    // 检查登录
    if (!sessionStorage.getItem('adminLoggedIn')) location.href = 'index.html';

    // 标签切换
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        item.classList.add('active');
        document.getElementById(item.dataset.tab).classList.add('active');
      });
    });

    // Toast 提示
    function showToast(msg, type = 'default') {
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    // ==================== MD 文件导入 ====================
    // MD 模板内容
    const MD_TEMPLATE = `---
title: 文章标题
category: 前端开发
tags:
  - JavaScript
  - Vue
summary: 文章摘要，自动取前50字作为摘要
---

# 文章标题

这里是文章正文内容...

## 小标题

- 列表项1
- 列表项2

\`\`\`javascript
// 代码示例
console.log('Hello World');
\`\`\`

> 引用内容
`;

    // 下载 MD 模板
    function downloadMdTemplate() {
      const blob = new Blob([MD_TEMPLATE], { type: 'text/markdown;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.getElementById('mdTemplateDownload');
      a.href = url;
      a.download = 'article-template.md';
      a.click();
      URL.revokeObjectURL(url);
      showToast('模板已下载', 'success');
    }

    // 解析 MD 文件
    function handleMdFileImport(input) {
      const file = input.files[0];
      if (!file) return;

      document.getElementById('mdFileName').textContent = `已选择: ${file.name}`;

      const reader = new FileReader();
      reader.onload = function(e) {
        const content = e.target.result;
        const parsed = parseMdContent(content);
        
        // 填充表单
        if (parsed.title) document.getElementById('articleTitle').value = parsed.title;
        if (parsed.summary) document.getElementById('articleSummary').value = parsed.summary;
        if (parsed.tags) document.getElementById('articleTags').value = parsed.tags.join(', ');
        if (parsed.content) document.getElementById('articleContent').value = parsed.content;
        
        // 设置分类
        if (parsed.category) {
          const catSelect = document.getElementById('articleCategory');
          const options = catSelect.options;
          for (let i = 0; i < options.length; i++) {
            if (options[i].value === parsed.category || options[i].text === parsed.category) {
              catSelect.selectedIndex = i;
              break;
            }
          }
        }

        showToast(`导入成功！提取到：标题、${parsed.tags.length}个标签`, 'success');
      };

      reader.onerror = function() {
        showToast('文件读取失败', 'error');
      };

      reader.readAsText(file);
    }

    // 解析 MD 内容
    function parseMdContent(content) {
      const result = {
        title: '',
        category: '',
        tags: [],
        summary: '',
        content: ''
      };

      // 检查是否有 frontmatter (--- ... ---)
      const frontmatterMatch = content.match(/^---\n([\s\S]*?)\n---/);
      let mainContent = content;

      if (frontmatterMatch) {
        const frontmatter = frontmatterMatch[1];
        mainContent = content.slice(frontmatterMatch[0].length).trim();

        // 解析 frontmatter
        frontmatter.split('\n').forEach(line => {
          const colonIndex = line.indexOf(':');
          if (colonIndex === -1) return;

          const key = line.slice(0, colonIndex).trim().toLowerCase();
          const value = line.slice(colonIndex + 1).trim();

          switch (key) {
            case 'title':
              result.title = value.replace(/^["']|["']$/g, '');
              break;
            case 'category':
            case 'categories':
              result.category = value.replace(/^["']|["']$/g, '');
              break;
            case 'tags':
              // 处理数组格式: [tag1, tag2] 或 - tag1\n- tag2
              if (value.startsWith('[')) {
                // JSON 数组格式
                try {
                  result.tags = JSON.parse(value.replace(/'/g, '"'));
                } catch (e) {
                  result.tags = value.replace(/[\[\]]/g, '').split(',').map(t => t.trim());
                }
              } else {
                // YAML 列表格式 - 已在下面处理
              }
              break;
            case 'summary':
              result.summary = value.replace(/^["']|["']$/g, '');
              break;
          }
        });

        // 处理 YAML 列表格式的 tags
        if (result.tags.length === 0 && frontmatter.includes('tags:')) {
          const tagsBlock = frontmatter.match(/tags:\n((?:\s*-\s*.+\n)*)/);
          if (tagsBlock) {
            result.tags = tagsBlock[1].split('\n')
              .filter(line => line.trim().startsWith('-'))
              .map(line => line.replace(/^\s*-\s*/, '').trim());
          }
        }
      }

      // 从正文提取标题（如果没有 frontmatter title）
      if (!result.title) {
        const h1Match = mainContent.match(/^#\s+(.+)$/m);
        if (h1Match) {
          result.title = h1Match[1].trim();
          // 移除正文中的 # 标题
          mainContent = mainContent.replace(/^#\s+.+\n+/, '');
        }
      }

      // 生成摘要（如果没有提供）
      if (!result.summary) {
        // 移除 markdown 语法，纯文本提取
        const plainText = mainContent
          .replace(/```[\s\S]*?```/g, '') // 移除代码块
          .replace(/`[^`]+`/g, '') // 移除行内代码
          .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1') // 链接
          .replace(/!\[([^\]]*)\]\([^)]+\)/g, '') // 图片
          .replace(/^#+\s+.+$/gm, '') // 移除标题
          .replace(/^>\s+.+$/gm, '') // 移除引用
          .replace(/^[-*]\s+/gm, '') // 移除列表
          .replace(/\n+/g, ' ') // 换行变空格
          .trim();
        
        result.summary = plainText.slice(0, 100) + (plainText.length > 100 ? '...' : '');
      }

      // 存储正文内容
      result.content = mainContent;

      return result;
    }

    // 加载数据
    async function loadData() {
      try {
        const [arts, cats, msgs] = await Promise.all([
          fetch(API + '/articles?pageSize=1000').then(r => r.json()),
          fetch(API + '/categories').then(r => r.json()),
          fetch(API + '/messages').then(r => r.json())
        ]);
        
        allArticles = arts.articles || arts || [];
        allCategories = Array.isArray(cats) ? cats : [];

        // 统计
        document.getElementById('statArticles').textContent = allArticles.length;
        document.getElementById('statViews').textContent = allArticles.reduce((s, a) => s + (a.readCount || 0), 0);
        document.getElementById('statCategories').textContent = allCategories.length;
        document.getElementById('statMessages').textContent = Array.isArray(msgs) ? msgs.length : (msgs.messages || []).length;

        // 最新文章
        const recent = [...allArticles].sort((a,b) => new Date(b.createTime) - new Date(a.createTime)).slice(0, 5);
        document.getElementById('recentArticles').innerHTML = recent.map(a => 
          `<tr><td>${a.title}</td><td>${a.category}</td><td>${a.readCount||0}</td><td>${new Date(a.createTime).toLocaleDateString()}</td></tr>`
        ).join('');

        // 文章列表
        document.getElementById('articlesList').innerHTML = allArticles.map(a => 
          `<tr>
            <td>${a.id}</td>
            <td>${a.title}</td>
            <td>${a.category}</td>
            <td>${a.readCount||0}</td>
            <td>${a.likeCount||0}</td>
            <td>${new Date(a.createTime).toLocaleDateString()}</td>
            <td class="actions">
              <button class="btn-small btn-edit" onclick="editArticle(${a.id})">编辑</button>
              <button class="btn-small btn-delete" onclick="deleteArticle(${a.id})">删除</button>
            </td>
          </tr>`
        ).join('');

        // 留言列表
        const msgsList = Array.isArray(msgs) ? msgs : (msgs.messages || []);
        document.getElementById('messagesList').innerHTML = msgsList.map(m => 
          `<tr>
            <td>${m.id}</td>
            <td>${m.nickname}</td>
            <td>${m.email||''}</td>
            <td>${(m.content||'').substring(0,40)}...</td>
            <td>${new Date(m.createTime).toLocaleDateString()}</td>
            <td><button class="btn-small btn-delete" onclick="deleteMessage(${m.id})">删除</button></td>
          </tr>`
        ).join('');

        // 分类树
        renderCategoryTree();

      } catch (e) {
        showToast('数据加载失败', 'error');
        console.error(e);
      }
    }

    // 渲染分类树
    function renderCategoryTree() {
      const container = document.getElementById('categoryTree');
      if (!allCategories.length) {
        container.innerHTML = '<p style="color:var(--text-secondary);padding:20px">暂无分类，点击上方按钮创建</p>';
        return;
      }

      const getChildren = (parentId) => allCategories.filter(c => c.parentId === parentId);
      const getArticleCount = (catName) => allArticles.filter(a => a.category === catName).length;

      function buildBranch(parentId, level) {
        const children = getChildren(parentId);
        if (children.length === 0) return '';

        return children.map(cat => {
          const kids = getChildren(cat.id);
          const hasKids = kids.length > 0;
          const indent = level > 0 ? `cat-indent-${Math.min(level, 3)}` : '';
          const artCount = getArticleCount(cat.name);
          
          return `
            <div class="cat-branch">
              <div class="cat-item ${indent}">
                ${hasKids ? `<button class="cat-expand-btn" onclick="toggleCatBranch(this, ${cat.id})"><i class="ri-arrow-right-s-line"></i></button>` : '<span style="width:20px"></span>'}
                <i class="${cat.icon || 'ri-folder-line'} cat-icon" style="color:${cat.color || '#165DFF'}"></i>
                <span class="cat-name">${cat.name}</span>
                <span class="cat-count">${artCount} 篇</span>
                <div class="cat-actions">
                  <button class="cat-add-child" onclick="showCategoryModal(null, ${cat.id})" title="添加子分类"><i class="ri-add-line"></i></button>
                  <button class="cat-move-up" onclick="moveCategory(${cat.id},'up')" title="上移"><i class="ri-arrow-up-line"></i></button>
                  <button class="cat-move-down" onclick="moveCategory(${cat.id},'down')" title="下移"><i class="ri-arrow-down-line"></i></button>
                  <button class="cat-edit-btn" onclick="editCategory(${cat.id})" title="编辑"><i class="ri-edit-line"></i></button>
                  <button class="cat-delete-btn" onclick="deleteCategory(${cat.id})" title="删除"><i class="ri-delete-bin-line"></i></button>
                </div>
              </div>
              <div class="cat-child-container" style="display:${level === 0 ? 'block' : 'none'}">
                ${buildBranch(cat.id, level + 1)}
              </div>
            </div>
          `;
        }).join('');
      }

      container.innerHTML = buildBranch(0, 0);
    }

    // 展开/收起子分类
    function toggleCatBranch(btn, catId) {
      const container = btn.closest('.cat-branch').querySelector('.cat-child-container');
      const isHidden = container.style.display === 'none';
      container.style.display = isHidden ? 'block' : 'none';
      btn.classList.toggle('expanded', isHidden);
    }

    // 文章操作
    function showArticleModal(id = null) {
      const modal = document.getElementById('articleModal');
      const title = document.getElementById('articleModalTitle');
      const form = document.getElementById('articleForm');
      const catSelect = document.getElementById('articleCategory');
      
      // 填充分类下拉
      catSelect.innerHTML = allCategories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');

      if (id) {
        const article = allArticles.find(a => a.id === id);
        if (article) {
          title.textContent = '编辑文章';
          document.getElementById('articleId').value = article.id;
          document.getElementById('articleTitle').value = article.title;
          document.getElementById('articleSummary').value = article.summary || '';
          document.getElementById('articleCategory').value = article.category;
          document.getElementById('articleTags').value = (article.tags || []).join(', ');
          document.getElementById('articleContent').value = article.content || '';
        }
      } else {
        title.textContent = '新建文章';
        form.reset();
        document.getElementById('articleId').value = '';
      }
      modal.classList.add('show');
    }

    function closeArticleModal() {
      document.getElementById('articleModal').classList.remove('show');
    }

    function editArticle(id) {
      showArticleModal(id);
    }

    async function deleteArticle(id) {
      if (!confirm('确定要删除这篇文章吗？')) return;
      try {
        await fetch(API + '/articles/' + id, { method: 'DELETE' });
        showToast('删除成功', 'success');
        loadData();
      } catch (e) {
        showToast('删除失败', 'error');
      }
    }

    document.getElementById('articleForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const id = document.getElementById('articleId').value;
      const data = {
        title: document.getElementById('articleTitle').value,
        summary: document.getElementById('articleSummary').value,
        category: document.getElementById('articleCategory').value,
        tags: document.getElementById('articleTags').value.split(',').map(t => t.trim()).filter(Boolean),
        content: document.getElementById('articleContent').value
      };

      try {
        if (id) {
          await fetch(API + '/articles/' + id, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });
          showToast('更新成功', 'success');
        } else {
          await fetch(API + '/articles', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });
          showToast('创建成功', 'success');
        }
        closeArticleModal();
        loadData();
      } catch (e) {
        showToast('保存失败', 'error');
      }
    });

    // 分类操作
    let parentCategoryId = 0; // 记录新建分类时的父级ID
    function showCategoryModal(id = null, parentId = null) {
      const modal = document.getElementById('categoryModal');
      const title = document.getElementById('categoryModalTitle');
      const parentSelect = document.getElementById('categoryParent');
      
      // 填充父级分类下拉（排除自身及其后代）
      function getAllowedParents(excludeId) {
        const allowed = [{ id: 0, name: '无（顶级分类）' }];
        allCategories.forEach(c => {
          if (c.id !== excludeId) {
            allowed.push(c);
          }
        });
        return allowed;
      }
      
      const allowedParents = getAllowedParents(id);
      parentSelect.innerHTML = allowedParents.map(c => 
        `<option value="${c.id}">${c.name}</option>`
      ).join('');

      if (id) {
        const cat = allCategories.find(c => c.id === id);
        if (cat) {
          title.textContent = '编辑分类';
          document.getElementById('categoryId').value = cat.id;
          document.getElementById('categoryName').value = cat.name;
          document.getElementById('categoryParent').value = cat.parentId || 0;
          document.getElementById('categoryDesc').value = cat.description || '';
          document.getElementById('categoryIcon').value = cat.icon || 'ri-folder-line';
          document.getElementById('categoryColor').value = cat.color || '#165DFF';
        }
      } else {
        title.textContent = '新建分类';
        document.getElementById('categoryForm').reset();
        document.getElementById('categoryId').value = '';
        // 如果指定了父级ID
        if (parentId !== null) {
          parentCategoryId = parentId;
          const parentCat = allCategories.find(c => c.id === parentId);
          if (parentCat) {
            parentSelect.value = parentId;
            title.textContent = `新建子分类：${parentCat.name}`;
          }
        } else {
          parentCategoryId = 0;
        }
      }
      modal.classList.add('show');
    }

    function closeCategoryModal() {
      document.getElementById('categoryModal').classList.remove('show');
    }

    function editCategory(id) {
      showCategoryModal(id);
    }

    async function deleteCategory(id) {
      if (!confirm('确定要删除这个分类吗？子分类也会被删除！')) return;
      try {
        await fetch(API + '/categories/' + id, { method: 'DELETE' });
        showToast('删除成功', 'success');
        loadData();
      } catch (e) {
        showToast('删除失败', 'error');
      }
    }

    async function moveCategory(id, direction) {
      try {
        await fetch(API + '/categories/' + id + '/move', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ direction })
        });
        loadData();
      } catch (e) {
        showToast('移动失败', 'error');
      }
    }

    document.getElementById('categoryForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const id = document.getElementById('categoryId').value;
      const parentSelectValue = document.getElementById('categoryParent').value;
      const data = {
        name: document.getElementById('categoryName').value,
        parentId: parseInt(parentSelectValue) || 0,
        description: document.getElementById('categoryDesc').value,
        icon: document.getElementById('categoryIcon').value || 'ri-folder-line',
        color: document.getElementById('categoryColor').value
      };

      try {
        if (id) {
          // 检查是否将分类设置为其自身的子分类
          if (data.parentId === parseInt(id)) {
            showToast('不能将自己设为父分类', 'error');
            return;
          }
          await fetch(API + '/categories/' + id, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });
          showToast('更新成功', 'success');
        } else {
          await fetch(API + '/categories', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });
          showToast('创建成功', 'success');
        }
        closeCategoryModal();
        loadData();
      } catch (e) {
        showToast('保存失败', 'error');
      }
    });

    // 留言操作
    async function deleteMessage(id) {
      if (!confirm('确定要删除这条留言吗？')) return;
      try {
        await fetch(API + '/messages/' + id, { method: 'DELETE' });
        showToast('删除成功', 'success');
        loadData();
      } catch (e) {
        showToast('删除失败', 'error');
      }
    }

    function logout() {
      sessionStorage.removeItem('adminLoggedIn');
      location.href = 'index.html';
    }

    loadData();
  </script>
</body>
