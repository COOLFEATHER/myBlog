<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="OVERRAIN - 标签文章">
  <title>标签 - OVERRAIN</title>
  
  <!-- 样式 -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.min.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">OVERRAIN</a>
      
      <div class="nav-links" id="navLinks">
        <a href="index.html">首页</a>
        <a href="category.html">分类</a>
        <a href="project.html">项目</a>
        <a href="about.html">关于</a>
      </div>
      
      <div class="nav-right">
        <button class="theme-toggle" title="切换主题">🌙</button>
        <button class="nav-toggle" id="navToggle">
          <i class="ri-menu-line"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- 页面内容 -->
  <main class="tag-page">
    <!-- 页面标题 -->
    <header class="page-header">
      <div class="breadcrumb">
        <a href="index.html">首页</a>
        <span>/</span>
        <span>标签</span>
      </div>
      <h1 class="page-title" id="pageTitle">标签</h1>
      <p class="page-count" id="pageCount">共 0 篇文章</p>
    </header>

    <!-- 主内容区域 -->
    <div class="main-container">
      <!-- 文章列表 -->
      <section class="content-section">
        <div class="section-header">
          <h2><i class="ri-article-line"></i> 文章列表</h2>
          <select id="sortSelect" class="sort-select">
            <option value="latest">按时间排序</option>
            <option value="readCount">按热度排序</option>
          </select>
        </div>
        
        <div class="articles-grid" id="articlesGrid">
          <!-- 文章卡片将通过 JS 动态加载 -->
          <div class="article-skeleton"></div>
          <div class="article-skeleton"></div>
          <div class="article-skeleton"></div>
        </div>
        
        <div class="pagination" id="pagination"></div>
      </section>

      <!-- 侧边栏 -->
      <aside class="sidebar">
        <!-- 文章分类 -->
        <div class="sidebar-section">
          <h3 class="sidebar-title">
            <i class="ri-folder-line"></i> 文章分类
          </h3>
          <div class="category-list" id="categoryList">
            <!-- 分类列表将通过 JS 动态加载 -->
          </div>
        </div>

        <!-- 热门标签 -->
        <div class="sidebar-section">
          <h3 class="sidebar-title">
            <i class="ri-price-tag-3-line"></i> 热门标签
          </h3>
          <div class="tag-cloud" id="tagCloud">
            <!-- 标签云将通过 JS 动态加载 -->
          </div>
        </div>

        <!-- 热门文章 -->
        <div class="sidebar-section">
          <h3 class="sidebar-title">
            <i class="ri-fire-line"></i> 热门阅读
          </h3>
          <div class="hot-articles" id="hotArticles">
            <!-- 热门文章将通过 JS 动态加载 -->
          </div>
        </div>
      </aside>
    </div>
  </main>

  <!-- 底部 -->
  <footer class="footer">
    <div class="footer-social">
      <a href="https://github.com/yourname" target="_blank" title="GitHub">
        <i class="ri-github-line"></i>
      </a>
      <a href="https://blog.csdn.net/yourname" target="_blank" title="CSDN">
        <i class="ri-baidu-line"></i>
      </a>
      <a href="mailto:yourname@example.com" title="邮箱">
        <i class="ri-mail-line"></i>
      </a>
    </div>
    <p>&copy; 2024 OVERRAIN. 用热爱点燃技术的火花 🔥</p>
    <p class="copyright">基于 vibe coding 风格构建</p>
  </footer>

  <!-- 脚本 -->
  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
  <script src="js/tag.js"></script>
</body>
</html>
