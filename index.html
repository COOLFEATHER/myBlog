<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="OVERRAIN - 探索技术的边界，记录前端开发、后端架构、数据分析的成长之路">
  <meta name="author" content="OVERRAIN">
  <title>OVERRAIN - 探索技术的边界</title>
  
  <!-- 样式 -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.min.css">
  
  <!-- Prism.js 代码高亮（可选，用于直接预览） -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">OVERRAIN</a>
      
      <div class="nav-links" id="navLinks">
        <a href="index.html" class="active">首页</a>
        <a href="category.html">分类</a>
        <a href="about.html">关于</a>
      </div>
      
      <div class="nav-right">
        <button class="theme-toggle" title="切换主题">🌙</button>
        <button class="nav-toggle" id="navToggle">
          <i class="ri-menu-line"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- Hero 区域 -->
  <header class="hero">
    <div class="hero-content">
      <div class="hero-badge">📚 技术博客</div>
      <h1>探索技术的边界</h1>
      <p>记录前端开发、后端架构、数据分析的成长之路</p>
      <div class="hero-tags" id="heroTags"></div>
    </div>
  </header>

  <!-- 主内容区域 -->
  <main class="main-container">
    <!-- 文章列表 -->
    <section class="content-section">
      <div class="section-header">
        <h2><i class="ri-fire-line"></i> 最新文章</h2>
        <select id="sortSelect" class="sort-select">
          <option value="latest">按时间排序</option>
          <option value="readCount">按热度排序</option>
        </select>
      </div>
      
      <div class="articles-grid" id="articlesGrid">
        <!-- 文章卡片将通过 JS 动态加载 -->
        <div class="article-skeleton"></div>
        <div class="article-skeleton"></div>
        <div class="article-skeleton"></div>
      </div>
      
      <div class="pagination" id="pagination"></div>
    </section>

    <!-- 侧边栏 -->
    <aside class="sidebar">
      <!-- 文章分类 -->
      <div class="sidebar-section">
        <h3 class="sidebar-title">
          <i class="ri-folder-line"></i> 文章分类
        </h3>
        <div class="category-list" id="categoryList">
          <!-- 分类列表将通过 JS 动态加载 -->
        </div>
      </div>

      <!-- 热门标签 -->
      <div class="sidebar-section">
        <h3 class="sidebar-title">
          <i class="ri-price-tag-3-line"></i> 热门标签
        </h3>
        <div class="tag-cloud" id="tagCloud">
          <!-- 标签云将通过 JS 动态加载 -->
        </div>
      </div>

      <!-- 热门文章 -->
      <div class="sidebar-section">
        <h3 class="sidebar-title">
          <i class="ri-fire-line"></i> 热门阅读
        </h3>
        <div class="hot-articles" id="hotArticles">
          <!-- 热门文章将通过 JS 动态加载 -->
        </div>
      </div>
    </aside>
  </main>

  <!-- 底部 -->
  <footer class="footer">
    <div class="footer-social">
      <a href="https://github.com/yourname" target="_blank" title="GitHub">
        <i class="ri-github-line"></i>
      </a>
      <a href="https://blog.csdn.net/yourname" target="_blank" title="CSDN">
        <i class="ri-baidu-line"></i>
      </a>
      <a href="mailto:yourname@example.com" title="邮箱">
        <i class="ri-mail-line"></i>
      </a>
    </div>
    <p>&copy; 2024 OVERRAIN. 用热爱点燃技术的火花 🔥</p>
    <p class="copyright">基于 vibe coding 风格构建</p>
  </footer>

  <!-- 脚本 -->
  <script src="js/main.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
